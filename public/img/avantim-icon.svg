<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 52" width="76" height="52" fill="none">
  <defs>
    <linearGradient id="g" x1="4" y1="50" x2="72" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#59F0B9"/>
      <stop offset="1" stop-color="#0055FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="5" y1="48" x2="24" y2="5"
    stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="43" y1="48" x2="24" y2="5"
    stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <polyline
    points="13,31 36,31 47,20 58,24 68,12"
    stroke="url(#g)" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"
  />
  <circle cx="68" cy="12" r="4" fill="#59F0B9" filter="url(#dotGlow)"/>
</svg>
